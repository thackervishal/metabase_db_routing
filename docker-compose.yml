volumes:
  mb-appdb-data:
  tenant-a-data:
  tenant-b-data:

services:
  mb-app-db:
    image: postgres:latest
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - mb-appdb-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d metabase"]
      interval: 5s
      timeout: 5s
      retries: 10

  pg-tenant-a:
    image: postgres:latest
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: tenantdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./seed-a.sql:/docker-entrypoint-initdb.d/seed.sql:ro
      - tenant-a-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenantdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  pg-tenant-b:
    image: postgres:latest
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: tenantdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./seed-b.sql:/docker-entrypoint-initdb.d/seed.sql:ro
      - tenant-b-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenantdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  metabase:
    image: metabase/metabase-enterprise:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: mb-app-db
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: postgres
      MB_DB_PASS: postgres
    depends_on:
      mb-app-db:
        condition: service_healthy
      pg-tenant-a:
        condition: service_healthy
      pg-tenant-b:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
